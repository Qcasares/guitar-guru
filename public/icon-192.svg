<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" role="img" aria-label="Guitar Guru">
  <title>Guitar Guru</title>
  <!-- warm cream background -->
